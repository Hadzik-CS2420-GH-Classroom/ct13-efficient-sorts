<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#8e44ad" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">QUICK SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">partition(): Step-by-Step on [38, 55, 32, 95]</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">This is partition(data, 0, 3) — the first partition call from the trace above</text>

  <!-- ===== Parameter Key ===== -->
  <rect x="100" y="60" width="10" height="10" rx="2" fill="#2980b9" stroke="#2471a3" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="114" y="70" fill="#2980b9" font-weight="bold">i</tspan><tspan fill="#888"> boundary of "small" region</tspan>
  </text>
  <rect x="340" y="60" width="10" height="10" rx="2" fill="#8e44ad" stroke="#6c3483" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="354" y="70" fill="#8e44ad" font-weight="bold">j</tspan><tspan fill="#888"> scanner (left to right)</tspan>
  </text>
  <rect x="560" y="60" width="10" height="10" rx="2" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="574" y="70" fill="#e67e22" font-weight="bold">pivot</tspan><tspan fill="#888"> at data[high]</tspan>
  </text>

  <!-- Column headers -->
  <text x="195" y="90" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="90" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Row backgrounds -->
  <rect x="20" y="96" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="152" width="820" height="66" rx="0" fill="white"/>
  <rect x="20" y="218" width="820" height="66" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="284" width="820" height="66" rx="0" fill="white"/>
  <rect x="20" y="350" width="820" height="66" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="416" width="820" height="66" rx="0" fill="white"/>

  <!-- ===== ROW 1: Median-of-three picks pivot ===== -->
  <text x="30" y="110" font-size="10" fill="#555" font-style="italic">Step 1: Median-of-three selects pivot. Median of data[0]=38, data[1]=55, data[3]=95 is 55.</text>

  <rect x="30" y="116" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="134" fill="#888">// median-of-three → </tspan><tspan fill="#ddd">pivot = </tspan><tspan fill="#f39c12" font-weight="bold">55</tspan><tspan fill="#ddd">; i = -1;</tspan>
  </text>

  <line x1="380" y1="129" x2="438" y2="129" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,125 446,129 438,133" fill="#bdc3c7"/>

  <!-- data after median-of-three swap: [38, 95, 32, 55] -->
  <rect x="456" y="116" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="476" y="131" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="116" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="520" y="131" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <rect x="544" y="116" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="564" y="131" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="588" y="116" width="40" height="22" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="608" y="131" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="650" y="131" font-size="9" fill="#e67e22" font-weight="bold">← pivot</text>

  <!-- ===== ROW 2: j=0, 38 <= 55, swap (no-op) ===== -->
  <text x="30" y="168" font-size="10" fill="#555" font-style="italic">Step 2a: j=0. Is data[0]=38 &lt;= pivot=55?  Yes → i++, swap(data[0], data[0]).</text>

  <rect x="30" y="174" width="350" height="36" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="190" fill="#ddd">j=0: data[0]=38 &lt;= 55 &#x2192; i++; swap(data[0],data[0])</tspan>
    <tspan x="40" y="206" fill="#888">// i goes from -1 to 0. Swap is a no-op (same index).</tspan>
  </text>

  <line x1="380" y1="191" x2="438" y2="191" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,187 446,191 438,195" fill="#bdc3c7"/>

  <rect x="456" y="174" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="476" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="174" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="520" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <rect x="544" y="174" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="564" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="588" y="174" width="40" height="22" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="608" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="476" y="208" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">i=0</text>
  <text x="520" y="208" text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="bold">j→1</text>

  <!-- ===== ROW 3: j=1, 95 > 55, skip ===== -->
  <text x="30" y="234" font-size="10" fill="#555" font-style="italic">Step 2b: j=1. Is data[1]=95 &lt;= pivot=55?  No → skip. i stays at 0.</text>

  <rect x="30" y="240" width="350" height="36" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="256" fill="#ddd">j=1: data[1]=95 &gt; 55 &#x2192; skip</tspan>
    <tspan x="40" y="272" fill="#888">// 95 stays on the "big" side. No swap.</tspan>
  </text>

  <line x1="380" y1="257" x2="438" y2="257" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,253 446,257 438,261" fill="#bdc3c7"/>

  <rect x="456" y="240" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="476" y="255" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="240" width="40" height="22" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="520" y="255" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <rect x="544" y="240" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="564" y="255" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="588" y="240" width="40" height="22" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="608" y="255" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="476" y="274" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">i=0</text>
  <text x="564" y="274" text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="bold">j→2</text>
  <text x="520" y="274" text-anchor="middle" font-size="8" fill="#e74c3c">skip!</text>

  <!-- ===== ROW 4: j=2, 32 <= 55, swap data[1] and data[2] ===== -->
  <text x="30" y="300" font-size="10" fill="#555" font-style="italic">Step 2c: j=2. Is data[2]=32 &lt;= pivot=55?  Yes → i++, swap(data[1], data[2]).</text>

  <rect x="30" y="306" width="350" height="36" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="322" fill="#ddd">j=2: data[2]=32 &lt;= 55 &#x2192; i++; swap(data[1],data[2])</tspan>
    <tspan x="40" y="336" fill="#888">// i goes from 0 to 1. Swap 95 and 32.</tspan>
  </text>

  <line x1="380" y1="323" x2="438" y2="323" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,319 446,323 438,327" fill="#bdc3c7"/>

  <rect x="456" y="306" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="476" y="321" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="306" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="520" y="321" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="544" y="306" width="40" height="22" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="564" y="321" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <rect x="588" y="306" width="40" height="22" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="608" y="321" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="520" y="340" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">i=1</text>
  <text x="650" y="321" font-size="9" fill="#888">32 and 95 swapped!</text>

  <!-- ===== ROW 5: Place pivot — swap data[i+1] and data[high] ===== -->
  <text x="30" y="366" font-size="10" fill="#555" font-style="italic">Step 3: Loop done. Place pivot: swap(data[i+1], data[high]) = swap(data[2], data[3]).</text>

  <rect x="30" y="372" width="350" height="36" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="388" fill="#8fbc8f">swap(data[</tspan><tspan fill="#ce9178">2</tspan><tspan fill="#8fbc8f">], data[</tspan><tspan fill="#ce9178">3</tspan><tspan fill="#8fbc8f">]);</tspan><tspan fill="#888">  // place pivot</tspan>
    <tspan x="40" y="402" fill="#c586c0">return</tspan><tspan fill="#8fbc8f"> 2;</tspan><tspan fill="#888">                   // pivot's final index</tspan>
  </text>

  <line x1="380" y1="389" x2="438" y2="389" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="438,385 446,389 438,393" fill="#27ae60"/>

  <rect x="456" y="372" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="476" y="387" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="372" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="520" y="387" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="544" y="369" width="40" height="28" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="3"/>
  <text x="564" y="388" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <rect x="588" y="372" width="40" height="22" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="608" y="387" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <text x="564" y="410" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="bold">FINAL SPOT</text>

  <!-- ===== ROW 6: Result summary ===== -->
  <text x="30" y="436" font-size="10" fill="#555" font-style="italic">Result: pivot 55 is at index 2. Left side [38, 32] needs sorting. Right side [95] is a base case.</text>

  <rect x="456" y="424" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="476" y="439" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="424" width="40" height="22" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="520" y="439" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="544" y="424" width="40" height="22" rx="3" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="564" y="439" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <rect x="588" y="424" width="40" height="22" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="608" y="439" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>

  <rect x="456" y="450" width="84" height="14" rx="2" fill="#d5f5e3"/>
  <text x="498" y="461" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">≤ pivot</text>
  <rect x="544" y="450" width="40" height="14" rx="2" fill="#fdebd0"/>
  <text x="564" y="461" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="bold">pivot</text>
  <rect x="588" y="450" width="40" height="14" rx="2" fill="#d6eaf8"/>
  <text x="608" y="461" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">&gt; pivot</text>
  <text x="476" y="476" text-anchor="middle" font-size="9" fill="#888">recurse left</text>
  <text x="608" y="476" text-anchor="middle" font-size="9" fill="#888">base case</text>

  <!-- Footer -->
  <rect x="30" y="494" width="800" height="80" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="514" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">How the scan works:</text>
  <text x="50" y="534" fill="#555" font-size="11">1. <tspan font-weight="bold" fill="#2980b9">i</tspan> starts at low-1 (nothing in the "small" region yet)</text>
  <text x="50" y="550" fill="#555" font-size="11">2. <tspan font-weight="bold" fill="#8e44ad">j</tspan> scans left to right. When data[j] &#x2264; pivot: grow i, swap data[i] and data[j]</text>
  <text x="50" y="566" fill="#555" font-size="11">3. After the loop: swap <tspan font-weight="bold" fill="#e67e22">pivot</tspan> into position i+1. Return i+1 as the pivot's final index.</text>
</svg>

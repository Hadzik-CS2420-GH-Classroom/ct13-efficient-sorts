<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Partition: Rearranging Around a Pivot</text>
  <text x="430" y="50" text-anchor="middle" fill="#555" font-size="13">Scan with j, swap smaller elements to the left of boundary i, then place pivot</text>

  <!-- ===== CODE BLOCK ===== -->
  <rect x="30" y="64" width="800" height="162" rx="8" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#ddd">
    <tspan x="50" y="84" fill="#888">// Median-of-three: sort data[low], data[mid], data[high]</tspan>
    <tspan x="50" y="100" fill="#888">// so median ends up at data[high] as our pivot</tspan>
    <tspan x="50" y="120" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> pivot = data[high];</tspan><tspan fill="#888">  // pivot is last element</tspan>
    <tspan x="50" y="136" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> i = low - 1;</tspan><tspan fill="#888">          // i = boundary of "small" elements</tspan>
    <tspan x="50" y="156" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd"> j = low; j &lt; high; j++) {</tspan>
    <tspan x="70" y="172" fill="#c586c0">if</tspan><tspan fill="#ddd"> (data[j] &lt;= pivot) {</tspan>
    <tspan x="90" y="188" fill="#ddd">i++;</tspan><tspan fill="#888">  // grow the "small" region</tspan>
    <tspan x="90" y="204" fill="#dcdcaa">swap</tspan><tspan fill="#ddd">(data[i], data[j]);</tspan><tspan fill="#888">  // move small element left</tspan>
    <tspan x="50" y="216" fill="#ddd">}</tspan>
  </text>

  <!-- ===== VISUAL: SCAN IN PROGRESS ===== -->
  <!-- 7 boxes: width=48 height=30, gap=4. Total=7*48+6*4=360. Start=120 -->
  <!-- x: 120,172,224,276,328,380,432. Centers: 144,196,248,300,352,404,456 -->

  <text x="30" y="252" font-size="12" font-weight="bold" fill="#888">Scanning:</text>
  <text x="120" y="252" font-size="11" fill="#333">j scans left to right. If data[j] &lt;= pivot, increment i and swap data[i] with data[j].</text>

  <!-- Array boxes y=262 -->
  <!-- [55] green (<=pivot, swapped to left) -->
  <rect x="120" y="262" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="144" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">55</text>
  <!-- [38] green -->
  <rect x="172" y="262" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="196" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">38</text>
  <!-- [42] green -->
  <rect x="224" y="262" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="248" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">42</text>
  <!-- [95] blue (>pivot) -->
  <rect x="276" y="262" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="300" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">95</text>
  <!-- [78] blue, j is here -->
  <rect x="328" y="262" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="352" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">78</text>
  <!-- [72] blue, not yet scanned -->
  <rect x="380" y="262" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="404" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">72</text>
  <!-- [62] gold, pivot -->
  <rect x="432" y="262" width="48" height="30" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="456" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="white">62</text>

  <!-- Pointer labels -->
  <text x="248" y="306" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">i=2</text>
  <text x="352" y="306" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">j=4</text>
  <text x="456" y="306" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="bold">pivot</text>

  <!-- Region labels -->
  <rect x="120" y="314" width="156" height="16" rx="3" fill="#d5f5e3"/>
  <text x="198" y="326" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">&#x2264; pivot</text>
  <rect x="276" y="314" width="156" height="16" rx="3" fill="#d6eaf8"/>
  <text x="354" y="326" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="bold">&gt; pivot</text>

  <!-- ===== VISUAL: AFTER PARTITION ===== -->
  <text x="30" y="358" font-size="12" font-weight="bold" fill="#888">Result:</text>
  <text x="120" y="358" font-size="11" fill="#333">After loop: swap(data[i+1], data[high]) to place pivot in its final position.</text>

  <!-- Array y=368 -->
  <rect x="120" y="368" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="144" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">55</text>
  <rect x="172" y="368" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="196" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">38</text>
  <rect x="224" y="368" width="48" height="30" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="248" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">42</text>
  <!-- Pivot in final position -->
  <rect x="276" y="365" width="48" height="36" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="3"/>
  <text x="300" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">62</text>
  <rect x="328" y="368" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="352" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">78</text>
  <rect x="380" y="368" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="404" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">72</text>
  <rect x="432" y="368" width="48" height="30" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="456" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">95</text>

  <text x="300" y="416" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">FINAL POSITION</text>
  <text x="196" y="416" text-anchor="middle" font-size="10" fill="#27ae60">recurse left</text>
  <text x="404" y="416" text-anchor="middle" font-size="10" fill="#2980b9">recurse right</text>

  <!-- Return value code snippet -->
  <rect x="520" y="362" width="310" height="44" rx="6" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#ddd">
    <tspan x="540" y="380" fill="#dcdcaa">swap</tspan><tspan fill="#ddd">(data[i+1], data[high]);</tspan>
    <tspan x="540" y="396" fill="#c586c0">return</tspan><tspan fill="#ddd"> i + 1;</tspan><tspan fill="#888"> // pivot index</tspan>
  </text>

  <!-- Footer -->
  <rect x="30" y="440" width="800" height="110" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="462" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">How the scan works:</text>
  <text x="50" y="482" fill="#555" font-size="11">1. <tspan font-weight="bold">i</tspan> starts at low-1 (nothing in the "small" region yet)</text>
  <text x="50" y="498" fill="#555" font-size="11">2. <tspan font-weight="bold">j</tspan> scans from low to high-1. When data[j] &lt;= pivot: grow i, swap data[i] and data[j]</text>
  <text x="50" y="514" fill="#555" font-size="11">3. After loop: swap pivot (data[high]) into position i+1. Everything left is &#x2264; pivot, right is &gt; pivot</text>
  <text x="50" y="534" fill="#555" font-size="11">4. Return i+1 so quick_sort_recursive knows where to split for the next level</text>
</svg>
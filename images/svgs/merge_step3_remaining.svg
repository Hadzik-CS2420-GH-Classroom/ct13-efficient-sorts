<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 3: Copy Remaining Elements</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">When one half runs out, copy whatever is left from the other half</text>

  <!-- Code block -->
  <rect x="30" y="62" width="800" height="80" rx="8" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#ddd">
    <tspan x="50" y="82" fill="#888">// One half is exhausted. Copy remaining from the other.</tspan>
    <tspan x="50" y="100" fill="#c586c0">while</tspan><tspan fill="#ddd"> (i &lt; left_half.</tspan><tspan fill="#dcdcaa">size</tspan><tspan fill="#ddd">())  data[k++] = left_half[i++];</tspan>
    <tspan x="50" y="118" fill="#c586c0">while</tspan><tspan fill="#ddd"> (j &lt; right_half.</tspan><tspan fill="#dcdcaa">size</tspan><tspan fill="#ddd">()) data[k++] = right_half[j++];</tspan>
    <tspan x="50" y="136" fill="#888">// Only ONE of these loops actually runs (the other half is already empty)</tspan>
  </text>

  <!-- Visual: left half exhausted, right still has 95 -->
  <text x="30" y="176" font-size="12" font-weight="bold" fill="#888">Example:</text>
  <text x="110" y="176" font-size="11" fill="#333">Left half is exhausted (i reached the end). Right half still has [95].</text>

  <!-- Left half: all gray (consumed) -->
  <text x="30" y="210" font-size="11" fill="#888">left_half:</text>
  <rect x="130" y="194" width="52" height="28" rx="4" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text x="156" y="213" text-anchor="middle" fill="#aaa" font-size="12">55</text>
  <rect x="186" y="194" width="52" height="28" rx="4" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text x="212" y="213" text-anchor="middle" fill="#aaa" font-size="12">78</text>
  <rect x="242" y="194" width="52" height="28" rx="4" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text x="268" y="213" text-anchor="middle" fill="#aaa" font-size="12">88</text>
  <text x="310" y="213" font-size="10" fill="#888">i = 3 (done)</text>

  <!-- Right half: 95 remaining -->
  <text x="30" y="254" font-size="11" fill="#888">right_half:</text>
  <rect x="130" y="238" width="52" height="28" rx="4" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text x="156" y="257" text-anchor="middle" fill="#aaa" font-size="12">62</text>
  <rect x="186" y="238" width="52" height="28" rx="4" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text x="212" y="257" text-anchor="middle" fill="#aaa" font-size="12">72</text>
  <rect x="242" y="238" width="52" height="28" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="268" y="257" text-anchor="middle" fill="white" font-size="12" font-weight="bold">95</text>
  <text x="310" y="257" font-size="10" fill="#ca6f1e" font-weight="bold">j = 2 (one left!)</text>

  <!-- Arrow -->
  <text x="390" y="250" font-size="14" fill="#888">&#x2192;</text>

  <!-- Final output -->
  <text x="420" y="210" font-size="11" fill="#27ae60" font-weight="bold">data[left..right] complete:</text>
  <rect x="420" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="446" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">55</text>
  <rect x="476" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="502" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">62</text>
  <rect x="532" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="558" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">72</text>
  <rect x="588" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="614" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">78</text>
  <rect x="644" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="670" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">88</text>
  <rect x="700" y="220" width="52" height="28" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="726" y="239" text-anchor="middle" fill="white" font-size="12" font-weight="bold">95</text>
  <text x="770" y="244" font-size="12" fill="#27ae60" font-weight="bold">&#x2713;</text>

  <!-- Footer -->
  <rect x="30" y="282" width="800" height="66" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="302" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Why do we need two cleanup loops?</text>
  <text x="430" y="320" text-anchor="middle" fill="#555" font-size="11">The main while loop stops when one half is exhausted. The other may still have elements.</text>
  <text x="430" y="338" text-anchor="middle" fill="#555" font-size="11">Those remaining elements are already sorted and all larger than anything picked so far. Just copy them over.</text>
</svg>
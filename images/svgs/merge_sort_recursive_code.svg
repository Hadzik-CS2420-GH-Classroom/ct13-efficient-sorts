<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#2980b9" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">MERGE SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge_sort_recursive(): The Recursion</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">Split in half, recurse on each half, then merge the sorted halves back together</text>

  <!-- Column headers -->
  <text x="195" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="640" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="56" rx="0" fill="white"/>
  <rect x="20" y="190" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="246" width="820" height="56" rx="0" fill="white"/>
  <rect x="20" y="302" width="820" height="56" rx="0" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Base case ===== -->
  <rect x="30" y="88" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="106" fill="#c586c0">if</tspan><tspan fill="#ddd"> (left &gt;= right) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="380" y1="101" x2="438" y2="101" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,97 446,101 438,105" fill="#bdc3c7"/>

  <text x="456" y="96" font-size="11" fill="#e74c3c" font-weight="bold">Base case: stop splitting.</text>
  <text x="456" y="112" font-size="11" fill="#555">0 or 1 elements in this range. Already sorted.</text>
  <text x="456" y="128" font-size="10" fill="#888">This is what stops the recursion from going forever.</text>

  <!-- ===== ROW 2: Calculate mid ===== -->
  <rect x="30" y="144" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="162" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> mid = left + (right - left) / 2;</tspan>
  </text>

  <line x1="380" y1="157" x2="438" y2="157" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,153 446,157 438,161" fill="#bdc3c7"/>

  <text x="456" y="156" font-size="11" fill="#555">Find the midpoint to split the range in half.</text>
  <text x="456" y="172" font-size="11" fill="#555">Example: left=0, right=5 &#x2192; mid=2</text>

  <!-- ===== ROW 3: Recurse left ===== -->
  <rect x="30" y="200" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="218" fill="#dcdcaa">merge_sort_recursive</tspan><tspan fill="#ddd">(data, left, mid);</tspan>
  </text>

  <line x1="380" y1="213" x2="438" y2="213" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,209 446,213 438,217" fill="#bdc3c7"/>

  <text x="456" y="208" font-size="11" fill="#2980b9" font-weight="bold">Sort the left half first.</text>
  <text x="456" y="224" font-size="11" fill="#555">This call keeps splitting until it hits base case,</text>
  <text x="456" y="240" font-size="10" fill="#555">then merges on the way back up. Left is fully sorted when it returns.</text>

  <!-- ===== ROW 4: Recurse right ===== -->
  <rect x="30" y="256" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="274" fill="#dcdcaa">merge_sort_recursive</tspan><tspan fill="#ddd">(data, mid + 1, right);</tspan>
  </text>

  <line x1="380" y1="269" x2="438" y2="269" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,265 446,269 438,273" fill="#bdc3c7"/>

  <text x="456" y="264" font-size="11" fill="#ca6f1e" font-weight="bold">Then sort the right half.</text>
  <text x="456" y="280" font-size="11" fill="#555">Same process. Right is fully sorted when it returns.</text>

  <!-- ===== ROW 5: Merge ===== -->
  <rect x="30" y="312" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="330" fill="#dcdcaa">merge</tspan><tspan fill="#ddd">(data, left, mid, right);</tspan>
  </text>

  <line x1="380" y1="325" x2="438" y2="325" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,321 446,325 438,329" fill="#bdc3c7"/>

  <text x="456" y="320" font-size="11" fill="#27ae60" font-weight="bold">Now merge the two sorted halves.</text>
  <text x="456" y="336" font-size="11" fill="#555">Left half is sorted. Right half is sorted.</text>
  <text x="456" y="352" font-size="10" fill="#555">merge() interleaves them into one sorted range. (Steps 1-3)</text>

  <!-- Footer -->
  <rect x="30" y="370" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="388" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Key insight: this function calls ITSELF twice, then calls merge().</text>
  <text x="430" y="404" text-anchor="middle" fill="#555" font-size="11">The recursion creates log n levels of splitting. merge() does O(n) work at each level. Total: O(n log n).</text>
</svg>
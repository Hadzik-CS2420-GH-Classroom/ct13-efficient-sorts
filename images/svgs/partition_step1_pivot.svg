<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#8e44ad" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">QUICK SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">partition() Step 1: Median-of-Three Pivot Selection</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">partition(data, 0, 3) on [38, 55, 32, 95] — from the trace above</text>

  <!-- Column headers -->
  <text x="195" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="134" width="820" height="70" rx="0" fill="white"/>
  <rect x="20" y="204" width="820" height="56" rx="0" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Function call with initial data ===== -->
  <text x="30" y="92" font-size="10" fill="#555" font-style="italic">Called with low=0, high=3. The subarray is data[0..3].</text>

  <rect x="30" y="98" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="116" fill="#c586c0">int</tspan><tspan fill="#ddd"> mid = low + (high - low) / 2;</tspan><tspan fill="#888"> // mid = 1</tspan>
  </text>

  <line x1="380" y1="111" x2="438" y2="111" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,107 446,111 438,115" fill="#bdc3c7"/>

  <rect x="456" y="98" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="476" y="113" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="98" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="520" y="113" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <rect x="544" y="98" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="564" y="113" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="588" y="98" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="608" y="113" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <text x="476" y="130" text-anchor="middle" font-size="8" fill="#555">low=0</text>
  <text x="520" y="130" text-anchor="middle" font-size="8" fill="#555">mid=1</text>
  <text x="608" y="130" text-anchor="middle" font-size="8" fill="#555">high=3</text>

  <!-- ===== ROW 2: Median-of-three comparison ===== -->
  <text x="30" y="150" font-size="10" fill="#555" font-style="italic">Compare data[low]=38, data[mid]=55, data[high]=95. Median is 55 — move it to data[high].</text>

  <rect x="30" y="156" width="350" height="50" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="172" fill="#c586c0">if</tspan><tspan fill="#ddd"> (data[mid] &lt; data[low]) swap;</tspan><tspan fill="#888"> // 55&lt;38? No</tspan>
    <tspan x="40" y="186" fill="#c586c0">if</tspan><tspan fill="#ddd"> (data[high] &lt; data[low]) swap;</tspan><tspan fill="#888"> // 95&lt;38? No</tspan>
    <tspan x="40" y="200" fill="#c586c0">if</tspan><tspan fill="#ddd"> (data[mid] &lt; data[high]) swap;</tspan><tspan fill="#888"> // 55&lt;95? Yes!</tspan>
  </text>

  <line x1="380" y1="181" x2="438" y2="181" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,177 446,181 438,185" fill="#bdc3c7"/>

  <!-- After swap: [38, 95, 32, 55] -->
  <text x="456" y="168" font-size="10" fill="#555" font-weight="bold">After swap(data[1], data[3]):</text>
  <rect x="456" y="174" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="476" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="500" y="174" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="520" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <rect x="544" y="174" width="40" height="22" rx="3" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="564" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="588" y="174" width="40" height="22" rx="3" fill="#f39c12" stroke="#e67e22" stroke-width="2.5"/>
  <text x="608" y="189" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="650" y="189" font-size="9" fill="#e67e22" font-weight="bold">← pivot</text>

  <!-- ===== ROW 3: Set pivot and i ===== -->
  <text x="30" y="220" font-size="10" fill="#555" font-style="italic">Pivot is now at data[high]. Initialize i to low-1 (nothing in the "small" region yet).</text>

  <rect x="30" y="226" width="350" height="26" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="244" fill="#8fbc8f">pivot = data[3] = </tspan><tspan fill="#2ecc71" font-weight="bold">55</tspan><tspan fill="#8fbc8f">;  i = -1;</tspan>
  </text>

  <line x1="380" y1="239" x2="438" y2="239" stroke="#27ae60" stroke-width="1.5"/>
  <polygon points="438,235 446,239 438,243" fill="#27ae60"/>

  <text x="456" y="239" font-size="10" fill="#888">pivot = 55, i = -1 (no "small" elements yet)</text>

  <!-- ===== END STATE ===== -->
  <rect x="30" y="270" width="800" height="66" rx="8" fill="#f4f6f7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="430" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">After Step 1: ready to scan</text>

  <rect x="56" y="300" width="10" height="10" rx="2" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="310" fill="#e67e22" font-weight="bold">pivot</tspan><tspan fill="#888"> = 55 (at data[high]) — Step 2 will scan and partition around this value</tspan>
  </text>

  <rect x="56" y="320" width="10" height="10" rx="2" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="330" fill="#333" font-weight="bold">data[]</tspan><tspan fill="#888"> = [38, 95, 32, 55]  i = -1 (boundary starts before the array)</tspan>
  </text>

  <!-- Callout -->
  <rect x="30" y="348" width="800" height="44" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="430" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Why median-of-three?</text>
  <text x="430" y="382" text-anchor="middle" font-size="10" fill="#555">Picking the last element as pivot gives O(n²) on sorted input. Median-of-three avoids this worst case.</text>
</svg>

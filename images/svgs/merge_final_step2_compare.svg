<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 670" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#2980b9" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">MERGE SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 2: Compare Fronts, Pick Smaller</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">merge(data, 0, 1, 3) — left_half = [38, 55], right_half = [32, 95]</text>

  <!-- ===== Pointer Key (map-legend style) ===== -->
  <rect x="180" y="62" width="10" height="10" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="194" y="72" fill="#2980b9" font-weight="bold">i</tspan><tspan fill="#888"> read left</tspan>
  </text>
  <rect x="380" y="62" width="10" height="10" rx="2" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="394" y="72" fill="#ca6f1e" font-weight="bold">j</tspan><tspan fill="#888"> read right</tspan>
  </text>
  <rect x="560" y="62" width="10" height="10" rx="2" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="574" y="72" fill="#27ae60" font-weight="bold">k</tspan><tspan fill="#888"> write to data[]</tspan>
  </text>

  <!-- Column headers -->
  <text x="195" y="96" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="96" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Row backgrounds -->
  <rect x="20" y="102" width="820" height="80" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="182" width="820" height="96" rx="0" fill="white"/>
  <rect x="20" y="278" width="820" height="96" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="374" width="820" height="96" rx="0" fill="white"/>
  <rect x="20" y="470" width="820" height="40" rx="0" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Initialize pointers ===== -->
  <text x="30" y="116" font-size="10" fill="#555" font-style="italic">Set up the three pointers, then loop while both halves still have unprocessed elements.</text>

  <rect x="30" y="122" width="350" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="138" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> i = 0, j = 0, k = left;</tspan>
    <tspan x="40" y="154" fill="#c586c0">while</tspan><tspan fill="#ddd"> (i &lt; left.size() &amp;&amp; j &lt; right.size())</tspan>
  </text>

  <line x1="380" y1="142" x2="438" y2="142" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,138 446,142 438,146" fill="#bdc3c7"/>

  <!-- Both halves -->
  <text x="456" y="130" font-size="10" fill="#2980b9" font-weight="bold">left_half:</text>
  <rect x="526" y="122" width="36" height="20" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="544" y="136" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="566" y="122" width="36" height="20" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="584" y="136" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="544" y="152" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">i=0&#x2191;</text>

  <text x="630" y="130" font-size="10" fill="#ca6f1e" font-weight="bold">right_half:</text>
  <rect x="710" y="122" width="36" height="20" rx="3" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="728" y="136" text-anchor="middle" fill="white" font-size="10" font-weight="bold">32</text>
  <rect x="750" y="122" width="36" height="20" rx="3" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text x="768" y="136" text-anchor="middle" fill="white" font-size="10" font-weight="bold">95</text>
  <text x="728" y="152" text-anchor="middle" font-size="8" fill="#ca6f1e" font-weight="bold">j=0&#x2191;</text>

  <!-- Output array: data[] with empty slots -->
  <text x="456" y="172" font-size="10" fill="#555" font-weight="bold">data[] (writing results back here):</text>
  <rect x="646" y="162" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="661" y="175" text-anchor="middle" fill="#bdc3c7" font-size="9">?</text>
  <rect x="680" y="162" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="695" y="175" text-anchor="middle" fill="#bdc3c7" font-size="9">?</text>
  <rect x="714" y="162" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="729" y="175" text-anchor="middle" fill="#bdc3c7" font-size="9">?</text>
  <rect x="748" y="162" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="763" y="175" text-anchor="middle" fill="#bdc3c7" font-size="9">?</text>

  <!-- ===== ROW 2: Iter 1 — 38 vs 32, pick 32 ===== -->
  <text x="30" y="198" font-size="10" fill="#555" font-style="italic">Iteration 1: Compare left_half[0] vs right_half[0].</text>

  <rect x="30" y="204" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="222" fill="#ddd">left[0]=38 &gt; right[0]=32  &#x2192; data[k++]=right[j++]</tspan>
  </text>

  <line x1="380" y1="217" x2="438" y2="217" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,213 446,217 438,221" fill="#bdc3c7"/>

  <text x="456" y="217" font-size="10" fill="#27ae60" font-weight="bold">38 &gt; 32, pick right</text>

  <rect x="30" y="236" width="350" height="36" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="252" fill="#8fbc8f">data[</tspan><tspan fill="#ce9178">0</tspan><tspan fill="#8fbc8f">] = right_half[</tspan><tspan fill="#ce9178">0</tspan><tspan fill="#8fbc8f">] = </tspan><tspan fill="#2ecc71" font-weight="bold">32</tspan><tspan fill="#888">   // write at k=0</tspan>
    <tspan x="40" y="266" fill="#888">// after: k=1, j=1</tspan>
  </text>

  <text x="456" y="244" font-size="10" fill="#555" font-weight="bold">data[]:</text>
  <rect x="496" y="236" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="511" y="249" text-anchor="middle" fill="white" font-size="9" font-weight="bold">32</text>
  <rect x="530" y="236" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="564" y="236" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="598" y="236" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- ===== ROW 3: Iter 2 — 38 vs 95, pick 38 ===== -->
  <text x="30" y="294" font-size="10" fill="#555" font-style="italic">Iteration 2: Compare left_half[0] vs right_half[1].</text>

  <rect x="30" y="300" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="318" fill="#ddd">left[0]=38 &lt;= right[1]=95 &#x2192; data[k++]=left[i++]</tspan>
  </text>

  <line x1="380" y1="313" x2="438" y2="313" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,309 446,313 438,317" fill="#bdc3c7"/>

  <text x="456" y="313" font-size="10" fill="#27ae60" font-weight="bold">38 &#x2264; 95, pick left</text>

  <rect x="30" y="332" width="350" height="36" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="348" fill="#8fbc8f">data[</tspan><tspan fill="#ce9178">1</tspan><tspan fill="#8fbc8f">] = left_half[</tspan><tspan fill="#ce9178">0</tspan><tspan fill="#8fbc8f">] = </tspan><tspan fill="#2ecc71" font-weight="bold">38</tspan><tspan fill="#888">   // write at k=1</tspan>
    <tspan x="40" y="362" fill="#888">// after: k=2, i=1</tspan>
  </text>

  <text x="456" y="340" font-size="10" fill="#555" font-weight="bold">data[]:</text>
  <rect x="496" y="332" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="511" y="345" text-anchor="middle" fill="white" font-size="9" font-weight="bold">32</text>
  <rect x="530" y="332" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="545" y="345" text-anchor="middle" fill="white" font-size="9" font-weight="bold">38</text>
  <rect x="564" y="332" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="598" y="332" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- ===== ROW 4: Iter 3 — 55 vs 95, pick 55 ===== -->
  <text x="30" y="390" font-size="10" fill="#555" font-style="italic">Iteration 3: Compare left_half[1] vs right_half[1].</text>

  <rect x="30" y="396" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="414" fill="#ddd">left[1]=55 &lt;= right[1]=95 &#x2192; data[k++]=left[i++]</tspan>
  </text>

  <line x1="380" y1="409" x2="438" y2="409" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,405 446,409 438,413" fill="#bdc3c7"/>

  <text x="456" y="409" font-size="10" fill="#27ae60" font-weight="bold">55 &#x2264; 95, pick left</text>

  <rect x="30" y="428" width="350" height="36" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="444" fill="#8fbc8f">data[</tspan><tspan fill="#ce9178">2</tspan><tspan fill="#8fbc8f">] = left_half[</tspan><tspan fill="#ce9178">1</tspan><tspan fill="#8fbc8f">] = </tspan><tspan fill="#2ecc71" font-weight="bold">55</tspan><tspan fill="#888">   // write at k=2</tspan>
    <tspan x="40" y="458" fill="#888">// after: k=3, i=2</tspan>
  </text>

  <text x="456" y="436" font-size="10" fill="#555" font-weight="bold">data[]:</text>
  <rect x="496" y="428" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="511" y="441" text-anchor="middle" fill="white" font-size="9" font-weight="bold">32</text>
  <rect x="530" y="428" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="545" y="441" text-anchor="middle" fill="white" font-size="9" font-weight="bold">38</text>
  <rect x="564" y="428" width="30" height="18" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="579" y="441" text-anchor="middle" fill="white" font-size="9" font-weight="bold">55</text>
  <rect x="598" y="428" width="30" height="18" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- ===== ROW 5: Loop exits ===== -->
  <text x="30" y="486" font-size="10" fill="#e74c3c" font-weight="bold">i=2 reaches end of left_half (size=2) — while loop exits.</text>
  <text x="30" y="500" font-size="9" fill="#888">right_half still has [95] at j=1. Step 3 will copy it into data[3].</text>

  <!-- ===== END STATE ===== -->
  <rect x="30" y="520" width="800" height="86" rx="8" fill="#f4f6f7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="430" y="538" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">After Step 2: state of the 3 vectors</text>

  <rect x="56" y="548" width="10" height="10" rx="2" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="558" fill="#27ae60" font-weight="bold">data[]</tspan><tspan fill="#888">       [</tspan><tspan fill="#27ae60" font-weight="bold">32, 38, 55</tspan><tspan fill="#888">, ?]  — 3 of 4 positions filled</tspan>
  </text>

  <rect x="56" y="568" width="10" height="10" rx="2" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="578" fill="#bdc3c7" font-weight="bold">left_half</tspan><tspan fill="#888">    [38, 55]  — all elements placed into data[] (i=2, nothing left)</tspan>
  </text>

  <rect x="56" y="588" width="10" height="10" rx="2" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="598" fill="#ca6f1e" font-weight="bold">right_half</tspan><tspan fill="#888">   [32, </tspan><tspan fill="#ca6f1e" font-weight="bold">95</tspan><tspan fill="#888">]  — 95 still unprocessed (j=1), Step 3 copies it</tspan>
  </text>

  <!-- Footer -->
  <rect x="30" y="620" width="800" height="42" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="638" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">3 iterations to place 3 elements. Each iteration: one comparison, one write. Pointers only move forward.</text>
  <text x="430" y="654" text-anchor="middle" fill="#555" font-size="10" font-style="italic">Notice how the first pick came from the right — 32 was smaller than 38. The algorithm handles this naturally.</text>
</svg>

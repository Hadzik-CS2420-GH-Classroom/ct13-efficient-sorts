<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#8e44ad" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">QUICK SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">Quick Sort: How the Three Functions Work Together</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">The .h exposes quick_sort(). The .cpp hides quick_sort_recursive() and partition() as static helpers.</text>

  <!-- ===== FUNCTION 1: quick_sort(), public wrapper ===== -->
  <rect x="30" y="68" width="800" height="70" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2"/>
  <text x="50" y="88" font-size="13" font-weight="bold" fill="#8e44ad">quick_sort(data)</text>
  <text x="270" y="88" font-size="11" fill="#888">public (declared in .h)</text>

  <rect x="50" y="96" width="760" height="34" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="70" y="112" fill="#c586c0">void</tspan><tspan fill="#dcdcaa"> quick_sort</tspan><tspan fill="#ddd">(vector&lt;int&gt;&amp; data) {</tspan>
    <tspan x="90" y="126" fill="#c586c0">if</tspan><tspan fill="#ddd"> (data.size() &lt;= 1) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd">;  quick_sort_recursive(data, 0, data.size()-1); }</tspan>
  </text>

  <!-- Arrow down -->
  <line x1="430" y1="138" x2="430" y2="158" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="424,158 430,168 436,158" fill="#8e44ad"/>
  <text x="450" y="156" font-size="10" fill="#8e44ad">calls</text>

  <!-- ===== FUNCTION 2: quick_sort_recursive() ===== -->
  <rect x="30" y="170" width="800" height="110" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
  <text x="50" y="190" font-size="13" font-weight="bold" fill="#2980b9">quick_sort_recursive(data, low, high)</text>
  <text x="420" y="190" font-size="11" fill="#888">static (hidden in .cpp, does the recursion)</text>

  <rect x="50" y="198" width="760" height="72" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="70" y="214" fill="#c586c0">static void</tspan><tspan fill="#dcdcaa"> quick_sort_recursive</tspan><tspan fill="#ddd">(data, low, high) {</tspan>
    <tspan x="90" y="230" fill="#c586c0">if</tspan><tspan fill="#ddd"> (low &gt;= high) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd">;</tspan><tspan fill="#888">                  // base case</tspan>
    <tspan x="90" y="246" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> pivot_idx = </tspan><tspan fill="#dcdcaa">partition</tspan><tspan fill="#ddd">(data, low, high);</tspan><tspan fill="#888"> // partition around pivot</tspan>
    <tspan x="90" y="262" fill="#dcdcaa">quick_sort_recursive</tspan><tspan fill="#ddd">(data, low, pivot_idx-1);</tspan><tspan fill="#888">  // sort left of pivot</tspan>
  </text>

  <!-- Arrow down -->
  <line x1="430" y1="280" x2="430" y2="300" stroke="#2980b9" stroke-width="2"/>
  <polygon points="424,300 430,310 436,300" fill="#2980b9"/>
  <text x="450" y="296" font-size="10" fill="#2980b9">calls</text>

  <!-- Self-referencing recursion arrow on left side -->
  <path d="M50,234 C20,234 20,264 50,264" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="50,260 50,268 58,264" fill="#e74c3c"/>
  <text x="14" y="252" font-size="8" fill="#e74c3c" text-anchor="middle" transform="rotate(-90, 14, 252)">recurse</text>

  <!-- ===== FUNCTION 3: partition() ===== -->
  <rect x="30" y="312" width="800" height="88" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="2"/>
  <text x="50" y="332" font-size="13" font-weight="bold" fill="#27ae60">partition(data, low, high)</text>
  <text x="300" y="332" font-size="11" fill="#888">static (hidden in .cpp, rearranges elements around a pivot)</text>

  <rect x="50" y="340" width="760" height="50" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="70" y="356" fill="#c586c0">static int</tspan><tspan fill="#dcdcaa"> partition</tspan><tspan fill="#ddd">(data, low, high) {</tspan>
    <tspan x="90" y="372" fill="#888">// Step 1: median-of-three pivot selection</tspan>
    <tspan x="90" y="386" fill="#888">// Step 2: scan with j, swap smaller elements left, place pivot in final position }</tspan>
  </text>

  <!-- ===== FLOW SUMMARY ===== -->
  <rect x="30" y="414" width="800" height="56" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="434" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">The call flow:</text>
  <text x="430" y="454" text-anchor="middle" font-size="11" fill="#555">
    <tspan fill="#8e44ad" font-weight="bold">quick_sort(data)</tspan>
    <tspan fill="#888"> &#x2192; </tspan>
    <tspan fill="#2980b9" font-weight="bold">quick_sort_recursive(0, n-1)</tspan>
    <tspan fill="#888"> &#x2192; </tspan>
    <tspan fill="#27ae60" font-weight="bold">partition()</tspan>
    <tspan fill="#888"> &#x2192; recurse on each side</tspan>
  </text>
  <text x="430" y="466" text-anchor="middle" font-size="11" fill="#555">partition() places one element in its final position each call. Average: O(n log n). Worst: O(n&#xB2;).</text>
</svg>

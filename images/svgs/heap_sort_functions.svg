<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#16a085" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">HEAP SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">Heap Sort: How the Two Functions Work Together</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">The .h exposes heap_sort(). The .cpp hides heapify_down() as a static helper.</text>

  <!-- ===== FUNCTION 1: heap_sort(), public ===== -->
  <rect x="30" y="68" width="800" height="140" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2"/>
  <text x="50" y="88" font-size="13" font-weight="bold" fill="#8e44ad">heap_sort(data)</text>
  <text x="240" y="88" font-size="11" fill="#888">public (declared in .h) -- orchestrates both phases</text>

  <rect x="50" y="96" width="760" height="102" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="70" y="112" fill="#c586c0">void</tspan><tspan fill="#dcdcaa"> heap_sort</tspan><tspan fill="#ddd">(vector&lt;int&gt;&amp; data) {</tspan>
    <tspan x="90" y="130" fill="#888">// Phase 1: Build max-heap</tspan>
    <tspan x="90" y="146" fill="#c586c0">for</tspan><tspan fill="#ddd"> (i = n/2-1; i &gt;= 0; --i)  </tspan><tspan fill="#dcdcaa">heapify_down</tspan><tspan fill="#ddd">(data, n, i);</tspan>
    <tspan x="90" y="164" fill="#888">// Phase 2: Extract max repeatedly</tspan>
    <tspan x="90" y="180" fill="#c586c0">for</tspan><tspan fill="#ddd"> (i = n-1; i &gt;= 1; --i) { swap(data[0], data[i]); </tspan><tspan fill="#dcdcaa">heapify_down</tspan><tspan fill="#ddd">(data, i, 0); }</tspan>
    <tspan x="70" y="194" fill="#ddd">}</tspan>
  </text>

  <!-- Arrow down -->
  <line x1="430" y1="208" x2="430" y2="228" stroke="#8e44ad" stroke-width="2"/>
  <polygon points="424,228 430,238 436,228" fill="#8e44ad"/>
  <text x="450" y="226" font-size="10" fill="#8e44ad">calls repeatedly</text>

  <!-- ===== FUNCTION 2: heapify_down() ===== -->
  <rect x="30" y="240" width="800" height="104" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="2"/>
  <text x="50" y="260" font-size="13" font-weight="bold" fill="#27ae60">heapify_down(data, heap_size, index)</text>
  <text x="400" y="260" font-size="11" fill="#888">static (hidden in .cpp, restores the max-heap property)</text>

  <rect x="50" y="268" width="760" height="66" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="70" y="284" fill="#c586c0">static void</tspan><tspan fill="#dcdcaa"> heapify_down</tspan><tspan fill="#ddd">(data, heap_size, index) {</tspan>
    <tspan x="90" y="300" fill="#888">// compare node with left and right children</tspan>
    <tspan x="90" y="316" fill="#888">// if a child is larger, swap and recurse down</tspan>
    <tspan x="90" y="330" fill="#888">// "sinks" a small element to its correct level -- O(log n) }</tspan>
  </text>

  <!-- ===== FLOW SUMMARY ===== -->
  <rect x="30" y="358" width="800" height="52" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="378" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">The call flow:</text>
  <text x="430" y="396" text-anchor="middle" font-size="11" fill="#555">
    <tspan fill="#8e44ad" font-weight="bold">heap_sort(data)</tspan>
    <tspan fill="#888"> calls </tspan>
    <tspan fill="#27ae60" font-weight="bold">heapify_down()</tspan>
    <tspan fill="#888"> in Phase 1 (build heap) and Phase 2 (extract max). O(n log n), O(1) space.</tspan>
  </text>
</svg>

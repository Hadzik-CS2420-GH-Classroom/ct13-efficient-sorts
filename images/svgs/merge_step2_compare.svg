<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 550" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#2980b9" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">MERGE SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 2: Compare Fronts, Pick Smaller</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">While both halves have elements, compare left_half[i] vs right_half[j], pick the smaller one</text>

  <!-- ===== Pointer Key (map-legend style) ===== -->
  <!-- i -->
  <rect x="180" y="62" width="10" height="10" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="194" y="72" fill="#2980b9" font-weight="bold">i</tspan><tspan fill="#888"> read left</tspan>
  </text>
  <!-- j -->
  <rect x="380" y="62" width="10" height="10" rx="2" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="394" y="72" fill="#ca6f1e" font-weight="bold">j</tspan><tspan fill="#888"> read right</tspan>
  </text>
  <!-- k -->
  <rect x="560" y="62" width="10" height="10" rx="2" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="574" y="72" fill="#27ae60" font-weight="bold">k</tspan><tspan fill="#888"> write to data[]</tspan>
  </text>

  <!-- Column headers -->
  <text x="195" y="118" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="118" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Row backgrounds -->
  <rect x="20" y="124" width="820" height="100" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="224" width="820" height="170" rx="0" fill="white"/>

  <!-- ===== ROW 1: Initialize pointers ===== -->
  <text x="30" y="138" font-size="10" fill="#555" font-style="italic">Set up the three pointers, then loop while both halves still have unprocessed elements.</text>

  <rect x="30" y="144" width="350" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="160" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> i = 0, j = 0, k = left;</tspan>
    <tspan x="40" y="176" fill="#c586c0">while</tspan><tspan fill="#ddd"> (i &lt; left.size() &amp;&amp; j &lt; right.size())</tspan>
  </text>

  <!-- Connector -->
  <line x1="380" y1="164" x2="438" y2="164" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,160 446,164 438,168" fill="#bdc3c7"/>

  <!-- Data: both halves with pointers -->
  <text x="456" y="152" font-size="10" fill="#2980b9" font-weight="bold">left_half:</text>
  <rect x="526" y="144" width="36" height="20" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="544" y="158" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <text x="544" y="174" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">i=0&#x2191;</text>

  <text x="600" y="152" font-size="10" fill="#ca6f1e" font-weight="bold">right_half:</text>
  <rect x="672" y="144" width="36" height="20" rx="3" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="690" y="158" text-anchor="middle" fill="white" font-size="10" font-weight="bold">55</text>
  <text x="690" y="174" text-anchor="middle" font-size="8" fill="#ca6f1e" font-weight="bold">j=0&#x2191;</text>

  <!-- Output array: data[] with empty slots -->
  <text x="456" y="196" font-size="10" fill="#555" font-weight="bold">data[] (writing results back here):</text>
  <rect x="646" y="186" width="36" height="20" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="664" y="200" text-anchor="middle" fill="#bdc3c7" font-size="10">?</text>
  <rect x="686" y="186" width="36" height="20" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="704" y="200" text-anchor="middle" fill="#bdc3c7" font-size="10">?</text>
  <text x="664" y="218" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">k=0&#x2191;</text>
  <text x="704" y="218" text-anchor="middle" font-size="7" fill="#888">[1]</text>

  <!-- ===== ROW 2: Iter 1, compare 38 vs 55, pick 38 ===== -->
  <text x="30" y="244" font-size="10" fill="#555" font-style="italic">Iteration 1: Compare the front of each half. The smaller one gets written into data[k].</text>

  <rect x="30" y="250" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="268" fill="#ddd">left[0]=38 &lt;= right[0]=55 &#x2192; data[k++]=left[i++]</tspan>
  </text>

  <line x1="380" y1="263" x2="438" y2="263" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,259 446,263 438,267" fill="#bdc3c7"/>

  <!-- 38 picked from left -->
  <text x="456" y="263" font-size="10" fill="#27ae60" font-weight="bold">38 &#x2264; 55, pick left</text>

  <!-- Concrete assignment box -->
  <rect x="30" y="280" width="350" height="50" rx="4" fill="#1a472a"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="40" y="294" fill="#888">// k++ means: use k first, THEN increment</tspan>
    <tspan x="40" y="310" fill="#8fbc8f">data[</tspan><tspan fill="#ce9178">0</tspan><tspan fill="#8fbc8f">] = left_half[</tspan><tspan fill="#ce9178">0</tspan><tspan fill="#8fbc8f">] = </tspan><tspan fill="#2ecc71" font-weight="bold">38</tspan><tspan fill="#888">   // write at k=0</tspan>
    <tspan x="40" y="324" fill="#888">// after: k=1, i=1</tspan>
  </text>

  <!-- Show data[] being filled — label above boxes -->
  <text x="456" y="290" font-size="10" fill="#555" font-weight="bold">data[] after write:</text>
  <rect x="456" y="296" width="36" height="20" rx="3" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="474" y="310" text-anchor="middle" fill="white" font-size="10" font-weight="bold">38</text>
  <rect x="496" y="296" width="36" height="20" rx="3" fill="white" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="514" y="310" text-anchor="middle" fill="#bdc3c7" font-size="10">?</text>
  <text x="474" y="326" text-anchor="middle" font-size="7" fill="#888">data[0]</text>
  <text x="514" y="326" text-anchor="middle" font-size="7" fill="#888">data[1]</text>

  <!-- Pointer state after -->
  <text x="456" y="348" font-size="9" fill="#888">Advance i to 1, k to 1.</text>
  <text x="456" y="362" font-size="9" fill="#e74c3c" font-weight="bold">i=1 reaches end of left_half — while loop exits.</text>
  <text x="456" y="376" font-size="9" fill="#888">right_half [55] still unprocessed — Step 3 handles it.</text>

  <!-- ===== END STATE: Three vectors after Step 2 ===== -->
  <rect x="30" y="394" width="800" height="86" rx="8" fill="#f4f6f7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="430" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">After Step 2: state of the 3 vectors</text>

  <!-- data[] -->
  <rect x="56" y="422" width="10" height="10" rx="2" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="432" fill="#27ae60" font-weight="bold">data[]</tspan><tspan fill="#888">       [</tspan><tspan fill="#27ae60" font-weight="bold">38</tspan><tspan fill="#888">, ?]  — position 0 filled, position 1 still empty</tspan>
  </text>

  <!-- left_half -->
  <rect x="56" y="442" width="10" height="10" rx="2" fill="#dfe6e9" stroke="#bdc3c7" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="452" fill="#bdc3c7" font-weight="bold">left_half</tspan><tspan fill="#888">    [38]  — all elements placed into data[] (i=1, nothing left to read)</tspan>
  </text>

  <!-- right_half -->
  <rect x="56" y="462" width="10" height="10" rx="2" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="472" fill="#ca6f1e" font-weight="bold">right_half</tspan><tspan fill="#888">   [</tspan><tspan fill="#ca6f1e" font-weight="bold">55</tspan><tspan fill="#888">]  — still has one element, Step 3 copies it</tspan>
  </text>

  <!-- ===== CALLOUTS ===== -->
  <!-- Stability callout -->
  <rect x="30" y="496" width="400" height="44" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="230" y="514" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Why &lt;= instead of &lt;?  This makes merge sort STABLE.</text>
  <text x="230" y="530" text-anchor="middle" font-size="10" fill="#555">Equal elements: left is picked first, preserving original order.</text>

  <!-- Footer -->
  <rect x="440" y="496" width="390" height="44" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="635" y="514" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Each iteration: one comparison, one write to data[k].</text>
  <text x="635" y="530" text-anchor="middle" fill="#555" font-size="10" font-style="italic">With larger halves, more iterations — same logic, more steps.</text>
</svg>

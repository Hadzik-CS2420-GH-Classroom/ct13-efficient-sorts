<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 1: Copy Halves to Temp Vectors</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">Line-by-line: each line of code and what it does to the data</text>

  <!-- Column headers -->
  <text x="195" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="640" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Alternating row backgrounds for visual grouping -->
  <rect x="20" y="78" width="820" height="78" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="156" width="820" height="88" rx="0" fill="white"/>
  <rect x="20" y="244" width="820" height="66" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="310" width="820" height="66" rx="0" fill="white"/>

  <!-- ===== ROW 1: Function signature ===== -->
  <rect x="30" y="88" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="106" fill="#c586c0">void</tspan><tspan fill="#dcdcaa"> merge</tspan><tspan fill="#ddd">(data, </tspan><tspan fill="#ce9178">left=0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#ce9178">right=5</tspan><tspan fill="#ddd">)</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="101" x2="430" y2="101" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="430,97 438,101 430,105" fill="#bdc3c7"/>

  <!-- Data: full array -->
  <rect x="440" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="462" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <rect x="488" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="510" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">78</text>
  <rect x="536" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="558" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">88</text>
  <rect x="584" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="606" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">62</text>
  <rect x="632" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="654" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">72</text>
  <rect x="680" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="702" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="462" y="128" text-anchor="middle" font-size="8" fill="#555">left=0</text>
  <text x="702" y="128" text-anchor="middle" font-size="8" fill="#555">right=5</text>
  <text x="750" y="105" font-size="9" fill="#888">unsorted subarray</text>

  <!-- ===== ROW 2: Calculate mid ===== -->
  <rect x="30" y="168" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="186" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> mid = left + (right - left) / 2;</tspan><tspan fill="#888"> // =2</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="181" x2="430" y2="181" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="430,177 438,181 430,185" fill="#bdc3c7"/>

  <!-- Data: halves colored, mid marked -->
  <rect x="440" y="168" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="462" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <rect x="488" y="168" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="510" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">78</text>
  <rect x="536" y="168" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="558" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">88</text>
  <rect x="584" y="168" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="606" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">62</text>
  <rect x="632" y="168" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="654" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">72</text>
  <rect x="680" y="168" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="702" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="462" y="206" text-anchor="middle" font-size="8" fill="#2980b9">left=0</text>
  <text x="558" y="206" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">mid=2</text>
  <text x="702" y="206" text-anchor="middle" font-size="8" fill="#ca6f1e">right=5</text>
  <rect x="440" y="210" width="140" height="14" rx="2" fill="#d6eaf8"/>
  <text x="510" y="221" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">left half [0..2]</text>
  <rect x="584" y="210" width="140" height="14" rx="2" fill="#fdebd0"/>
  <text x="654" y="221" text-anchor="middle" font-size="8" fill="#ca6f1e" font-weight="bold">right half [3..5]</text>

  <!-- ===== ROW 3: Copy left half ===== -->
  <rect x="30" y="256" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="274" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;int&gt; left_half(begin+left, begin+mid+1);</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="269" x2="438" y2="269" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,265 446,269 438,273" fill="#bdc3c7"/>

  <!-- Data: left_half = [boxes] inline -->
  <text x="520" y="273" text-anchor="end" font-size="12" fill="#2980b9" font-weight="bold">left_half =</text>
  <rect x="526" y="256" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="548" y="273" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <rect x="574" y="256" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="596" y="273" text-anchor="middle" fill="white" font-size="11" font-weight="bold">78</text>
  <rect x="622" y="256" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="644" y="273" text-anchor="middle" fill="white" font-size="11" font-weight="bold">88</text>
  <text x="684" y="273" font-size="9" fill="#888">copy of [0..2]</text>

  <!-- ===== ROW 4: Copy right half ===== -->
  <rect x="30" y="322" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="340" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;int&gt; right_half(begin+mid+1, begin+right+1);</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="335" x2="438" y2="335" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,331 446,335 438,339" fill="#bdc3c7"/>

  <!-- Data: right_half = [boxes] inline -->
  <text x="520" y="339" text-anchor="end" font-size="12" fill="#ca6f1e" font-weight="bold">right_half =</text>
  <rect x="526" y="322" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="548" y="339" text-anchor="middle" fill="white" font-size="11" font-weight="bold">62</text>
  <rect x="574" y="322" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="596" y="339" text-anchor="middle" fill="white" font-size="11" font-weight="bold">72</text>
  <rect x="622" y="322" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="644" y="339" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="684" y="339" font-size="9" fill="#888">copy of [3..5]</text>

  <!-- ===== CALLOUTS ===== -->
  <!-- Why copy -->
  <rect x="30" y="390" width="380" height="56" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="220" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Why copy first?</text>
  <text x="220" y="426" text-anchor="middle" font-size="10" fill="#555">Step 2 writes back into data[]. Without copies,</text>
  <text x="220" y="440" text-anchor="middle" font-size="10" fill="#555">we'd overwrite elements we haven't compared. Cost: <tspan font-weight="bold" fill="#e67e22">O(n) space</tspan>.</text>

  <!-- Why left and right -->
  <rect x="430" y="390" width="400" height="56" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="630" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">Why pass left and right?</text>
  <text x="630" y="426" text-anchor="middle" font-size="10" fill="#555">Recursion works on subarrays. merge(data, 0, 3) and</text>
  <text x="630" y="440" text-anchor="middle" font-size="10" fill="#555">merge(data, 4, 7) each merge different slices of data[].</text>

  <!-- Footer -->
  <rect x="30" y="460" width="800" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="480" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">After Step 1: both halves are safely copied. data[] can now be overwritten during merge.</text>
  <text x="430" y="498" text-anchor="middle" fill="#555" font-size="11">mid = left + (right - left) / 2 avoids integer overflow compared to (left + right) / 2.</text>
</svg>
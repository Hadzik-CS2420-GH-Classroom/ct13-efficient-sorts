<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 1: Copy Halves to Temp Vectors</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">We must copy before merging, otherwise we overwrite elements we haven't compared yet</text>

  <!-- Code block -->
  <rect x="30" y="62" width="800" height="80" rx="8" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#ddd">
    <tspan x="50" y="82" fill="#888">// Step 1-2: Copy both halves into temporary vectors</tspan>
    <tspan x="50" y="100" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd">&gt; left_half(data.</tspan><tspan fill="#dcdcaa">begin</tspan><tspan fill="#ddd">() + left, data.</tspan><tspan fill="#dcdcaa">begin</tspan><tspan fill="#ddd">() + mid + 1);</tspan>
    <tspan x="50" y="118" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd">&gt; right_half(data.</tspan><tspan fill="#dcdcaa">begin</tspan><tspan fill="#ddd">() + mid + 1, data.</tspan><tspan fill="#dcdcaa">begin</tspan><tspan fill="#ddd">() + right + 1);</tspan>
    <tspan x="50" y="136" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> i = 0, j = 0, k = left;</tspan><tspan fill="#888">  // pointers for left, right, output</tspan>
  </text>

  <!-- Visual: Original array with left/right halves identified -->
  <text x="30" y="172" font-size="12" font-weight="bold" fill="#333">Original array data[left..right]:</text>

  <!-- 6 boxes, width=56, gap=4. Total=6*56+5*4=356. Start=160 -->
  <rect x="160" y="180" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="188" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">55</text>
  <rect x="220" y="180" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="248" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">78</text>
  <rect x="280" y="180" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="308" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">88</text>
  <rect x="340" y="180" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="368" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">62</text>
  <rect x="400" y="180" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="428" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">72</text>
  <rect x="460" y="180" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="488" y="201" text-anchor="middle" fill="white" font-size="13" font-weight="bold">95</text>

  <!-- Labels -->
  <rect x="160" y="216" width="176" height="16" rx="3" fill="#d6eaf8"/>
  <text x="248" y="228" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="bold">data[left..mid]</text>
  <rect x="340" y="216" width="176" height="16" rx="3" fill="#fdebd0"/>
  <text x="428" y="228" text-anchor="middle" font-size="9" fill="#ca6f1e" font-weight="bold">data[mid+1..right]</text>

  <!-- Arrows down -->
  <text x="248" y="250" text-anchor="middle" font-size="14" fill="#888">&#x2193; copy</text>
  <text x="428" y="250" text-anchor="middle" font-size="14" fill="#888">&#x2193; copy</text>

  <!-- Temp vectors -->
  <text x="30" y="282" font-size="12" font-weight="bold" fill="#2980b9">left_half:</text>
  <rect x="160" y="268" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="188" y="289" text-anchor="middle" fill="white" font-size="13" font-weight="bold">55</text>
  <rect x="220" y="268" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="248" y="289" text-anchor="middle" fill="white" font-size="13" font-weight="bold">78</text>
  <rect x="280" y="268" width="56" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="308" y="289" text-anchor="middle" fill="white" font-size="13" font-weight="bold">88</text>

  <text x="30" y="330" font-size="12" font-weight="bold" fill="#ca6f1e">right_half:</text>
  <rect x="160" y="316" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="188" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">62</text>
  <rect x="220" y="316" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="248" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">72</text>
  <rect x="280" y="316" width="56" height="32" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="308" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">95</text>

  <!-- Pointer labels -->
  <text x="188" y="310" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="bold">i=0</text>
  <text x="188" y="358" text-anchor="middle" font-size="10" fill="#ca6f1e" font-weight="bold">j=0</text>

  <!-- Why callout -->
  <rect x="440" y="268" width="380" height="80" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="630" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">Why copy first?</text>
  <text x="630" y="308" text-anchor="middle" font-size="11" fill="#555">If we merge directly into data[], we</text>
  <text x="630" y="324" text-anchor="middle" font-size="11" fill="#555">overwrite elements we haven't compared.</text>
  <text x="630" y="340" text-anchor="middle" font-size="11" fill="#555">This copy is why merge sort needs <tspan font-weight="bold" fill="#e67e22">O(n) space</tspan>.</text>

  <!-- Footer -->
  <rect x="30" y="368" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="388" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Both halves are already sorted (from recursion). Now we just need to interleave them.</text>
  <text x="430" y="402" text-anchor="middle" fill="#555" font-size="11">Pointers i, j start at 0 (front of each half). k starts at left (where output goes in data[]).</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Heapify Down: Restoring the Max-Heap</text>
  <text x="430" y="50" text-anchor="middle" fill="#555" font-size="13">Compare node with children. If a child is larger, swap and continue sinking.</text>

  <!-- ===== CODE BLOCK ===== -->
  <rect x="30" y="64" width="800" height="146" rx="8" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11" fill="#ddd">
    <tspan x="50" y="84" fill="#c586c0">void</tspan><tspan fill="#dcdcaa"> heapify_down</tspan><tspan fill="#ddd">(vector&lt;int&gt;&amp; data, </tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd"> heap_size, </tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd"> index) {</tspan>
    <tspan x="70" y="100" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> largest = index;</tspan>
    <tspan x="70" y="116" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> left  = 2 * index + 1;</tspan><tspan fill="#888">  // left child</tspan>
    <tspan x="70" y="132" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> right = 2 * index + 2;</tspan><tspan fill="#888">  // right child</tspan>
    <tspan x="70" y="152" fill="#c586c0">if</tspan><tspan fill="#ddd"> (left &lt; heap_size &amp;&amp; data[left] &gt; data[largest])  largest = left;</tspan>
    <tspan x="70" y="168" fill="#c586c0">if</tspan><tspan fill="#ddd"> (right &lt; heap_size &amp;&amp; data[right] &gt; data[largest]) largest = right;</tspan>
    <tspan x="70" y="188" fill="#c586c0">if</tspan><tspan fill="#ddd"> (largest != index) { </tspan><tspan fill="#dcdcaa">swap</tspan><tspan fill="#ddd">(data[index], data[largest]);</tspan>
    <tspan x="90" y="200" fill="#dcdcaa">heapify_down</tspan><tspan fill="#ddd">(data, heap_size, largest); }</tspan><tspan fill="#888"> // recurse</tspan>
  </text>

  <!-- ===== VISUAL: BEFORE (left side) ===== -->
  <text x="200" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Before heapify_down(0)</text>

  <!-- Tree edges -->
  <line x1="200" y1="272" x2="130" y2="320" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="200" y1="272" x2="270" y2="320" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="130" y1="354" x2="100" y2="400" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Dashed swap path -->
  <line x1="215" y1="262" x2="260" y2="318" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Node 0 (55) red -->
  <text x="200" y="245" text-anchor="middle" font-size="9" fill="#888">[0]</text>
  <rect x="174" y="248" width="52" height="32" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="200" y="269" text-anchor="middle" font-size="15" font-weight="bold" fill="white">55</text>

  <!-- Node 1 (62) blue -->
  <text x="130" y="317" text-anchor="middle" font-size="9" fill="#888">[1]</text>
  <rect x="104" y="320" width="52" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="130" y="341" text-anchor="middle" font-size="15" font-weight="bold" fill="white">62</text>

  <!-- Node 2 (72) green, largest child -->
  <text x="270" y="317" text-anchor="middle" font-size="9" fill="#888">[2]</text>
  <rect x="244" y="320" width="52" height="32" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="2.5"/>
  <text x="270" y="341" text-anchor="middle" font-size="15" font-weight="bold" fill="white">72</text>
  <text x="310" y="342" font-size="10" fill="#219a52">largest</text>

  <!-- Node 3 (38) blue -->
  <text x="100" y="397" text-anchor="middle" font-size="9" fill="#888">[3]</text>
  <rect x="74" y="400" width="52" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="100" y="421" text-anchor="middle" font-size="15" font-weight="bold" fill="white">38</text>

  <!-- Code annotation pointing to tree -->
  <text x="60" y="460" font-size="10" fill="#e74c3c">55 &lt; 72, so largest = right</text>
  <text x="60" y="474" font-size="10" fill="#e74c3c">swap(data[0], data[2])</text>

  <!-- ===== ARROW ===== -->
  <line x1="395" y1="340" x2="455" y2="340" stroke="#e74c3c" stroke-width="2.5"/>
  <polygon points="455,334 465,340 455,346" fill="#e74c3c"/>
  <text x="430" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">swap</text>
  <text x="430" y="356" text-anchor="middle" font-size="11" fill="#555">then recurse</text>

  <!-- ===== VISUAL: AFTER (right side) ===== -->
  <text x="660" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">After heapify_down(0)</text>

  <!-- Tree edges -->
  <line x1="660" y1="272" x2="590" y2="320" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="660" y1="272" x2="730" y2="320" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="590" y1="354" x2="560" y2="400" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- Node 0 (72) green -->
  <text x="660" y="245" text-anchor="middle" font-size="9" fill="#888">[0]</text>
  <rect x="634" y="248" width="52" height="32" rx="4" fill="#27ae60" stroke="#219a52" stroke-width="1.5"/>
  <text x="660" y="269" text-anchor="middle" font-size="15" font-weight="bold" fill="white">72</text>

  <!-- Node 1 (62) blue -->
  <text x="590" y="317" text-anchor="middle" font-size="9" fill="#888">[1]</text>
  <rect x="564" y="320" width="52" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="590" y="341" text-anchor="middle" font-size="15" font-weight="bold" fill="white">62</text>

  <!-- Node 2 (55) blue (sank down) -->
  <text x="730" y="317" text-anchor="middle" font-size="9" fill="#888">[2]</text>
  <rect x="704" y="320" width="52" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="730" y="341" text-anchor="middle" font-size="15" font-weight="bold" fill="white">55</text>

  <!-- Node 3 (38) blue -->
  <text x="560" y="397" text-anchor="middle" font-size="9" fill="#888">[3]</text>
  <rect x="534" y="400" width="52" height="32" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="560" y="421" text-anchor="middle" font-size="15" font-weight="bold" fill="white">38</text>

  <text x="790" y="342" font-size="10" fill="#888">55 has no children</text>
  <text x="790" y="356" font-size="10" fill="#888">in bounds, done!</text>

  <!-- Footer -->
  <rect x="30" y="490" width="800" height="40" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="510" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">left = 2*i+1, right = 2*i+2. Compare parent with both children, swap with largest if needed.</text>
  <text x="430" y="524" text-anchor="middle" fill="#555" font-size="12">Runs in O(log n), at most the height of the tree.</text>
</svg>
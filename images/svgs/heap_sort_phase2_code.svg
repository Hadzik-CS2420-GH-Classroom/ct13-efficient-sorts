  <rect x="580" y="154" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="593" y="167" text-anchor="middle" fill="white" font-size="8">27</text>
  <rect x="610" y="154" width="26" height="18" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="623" y="167" text-anchor="middle" fill="white" font-size="8" font-weight="bold">32</text>
  <text x="443" y="180" text-anchor="middle" font-size="6" fill="#e74c3c">[0]</text>
  <text x="623" y="180" text-anchor="middle" font-size="6" fill="#e74c3c">[6]</text>

  <!-- After array -->
  <text x="430" y="196" font-size="10" fill="#27ae60" font-weight="bold">After:</text>
  <rect x="430" y="202" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="443" y="215" text-anchor="middle" fill="white" font-size="8" font-weight="bold">62</text>

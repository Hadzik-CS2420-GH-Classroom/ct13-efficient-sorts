  <text x="473" y="215" text-anchor="middle" fill="white" font-size="8">55</text>
  <rect x="490" y="202" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="503" y="215" text-anchor="middle" fill="white" font-size="8">43</text>
  <rect x="520" y="202" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="533" y="215" text-anchor="middle" fill="white" font-size="8">32</text>
  <rect x="550" y="202" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="563" y="215" text-anchor="middle" fill="white" font-size="8">38</text>
  <rect x="580" y="202" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="593" y="215" text-anchor="middle" fill="white" font-size="8">27</text>
  <line x1="604" y1="202" x2="604" y2="220" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="610" y="200" width="26" height="22" rx="3" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="623" y="215" text-anchor="middle" fill="white" font-size="8" font-weight="bold">95</text>
  <text x="623" y="230" text-anchor="middle" font-size="6" fill="#27ae60" font-weight="bold">FINAL</text>

  <!-- ================================================================ -->
  <!-- i=5: Extract 62                                                  -->
  <!-- ================================================================ -->
  <text x="30" y="248" font-size="12" fill="#16a085" font-weight="bold">i=5: Extract 62</text>
  <text x="180" y="248" font-size="10" fill="#555">Swap data[0]=62 with data[5]=27. Shrink heap to 5. Fix root.</text>


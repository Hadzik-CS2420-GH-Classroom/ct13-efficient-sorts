<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#16a085" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">HEAP SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">Phase 2: Extract Max Repeatedly</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">Swap root (max) to end, shrink heap, heapify_down on root. Starting: [95, 62, 43, 55, 38, 27, 32]</text>

  <!-- The loop code -->
  <rect x="30" y="62" width="800" height="36" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="78" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#4ec9b0">int</tspan><tspan fill="#ddd"> i = n-1; i &gt;= 1; --i) {</tspan>
    <tspan x="60" y="92" fill="#dcdcaa">swap</tspan><tspan fill="#ddd">(data[0], data[i]);  </tspan><tspan fill="#dcdcaa">heapify_down</tspan><tspan fill="#ddd">(data, i, 0); }</tspan><tspan fill="#888"> // 6 iterations</tspan>
  </text>

  <!-- Column headers -->
  <text x="195" y="116" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="116" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Row backgrounds -->
  <rect x="20" y="122" width="820" height="110" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="232" width="820" height="110" rx="0" fill="white"/>
  <rect x="20" y="342" width="820" height="110" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="452" width="820" height="56" rx="0" fill="white"/>

  <!-- ================================================================ -->
  <!-- i=6: Extract 95                                                  -->
  <!-- ================================================================ -->
  <text x="30" y="138" font-size="12" fill="#16a085" font-weight="bold">i=6: Extract 95</text>
  <text x="180" y="138" font-size="10" fill="#555">Swap data[0]=95 with data[6]=32. Shrink heap to 6. Fix root.</text>

  <rect x="30" y="146" width="380" height="50" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="162" fill="#dcdcaa">swap</tspan><tspan fill="#ddd">(data[0], data[6]);</tspan><tspan fill="#888">   // 95↔32</tspan>
    <tspan x="40" y="176" fill="#dcdcaa">heapify_down</tspan><tspan fill="#ddd">(data, 6, 0);</tspan><tspan fill="#888">  // fix root (heap is now 6 elements)</tspan>
    <tspan x="40" y="190" fill="#888">// 32 sinks: swap with 62, then with 38</tspan>
  </text>

  <!-- Before array -->
  <text x="430" y="148" font-size="10" fill="#888" font-weight="bold">Before:</text>
  <rect x="430" y="154" width="26" height="18" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="443" y="167" text-anchor="middle" fill="white" font-size="8" font-weight="bold">95</text>
  <rect x="460" y="154" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="473" y="167" text-anchor="middle" fill="white" font-size="8">62</text>
  <rect x="490" y="154" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="503" y="167" text-anchor="middle" fill="white" font-size="8">43</text>
  <rect x="520" y="154" width="26" height="18" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="533" y="167" text-anchor="middle" fill="white" font-size="8">55</text>

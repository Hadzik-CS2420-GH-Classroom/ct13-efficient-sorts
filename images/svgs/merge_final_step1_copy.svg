<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#2980b9" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">MERGE SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">merge() Step 1: Copy Halves to Temp Vectors</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">Now merging the full array: merge(data, 0, 1, 3) — the final merge in the trace</text>

  <!-- Column headers -->
  <text x="195" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="620" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">DATA STATE</text>

  <!-- Alternating row backgrounds -->
  <rect x="20" y="78" width="820" height="78" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="156" width="820" height="88" rx="0" fill="white"/>
  <rect x="20" y="244" width="820" height="66" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="310" width="820" height="66" rx="0" fill="white"/>

  <!-- ===== ROW 1: Function signature ===== -->
  <rect x="30" y="88" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="106" fill="#c586c0">void</tspan><tspan fill="#dcdcaa"> merge</tspan><tspan fill="#ddd">(data, </tspan><tspan fill="#ce9178">left=0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#ce9178">mid=1</tspan><tspan fill="#ddd">, </tspan><tspan fill="#ce9178">right=3</tspan><tspan fill="#ddd">)</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="101" x2="430" y2="101" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="430,97 438,101 430,105" fill="#bdc3c7"/>

  <!-- Data: full array [38, 55, 32, 95] -->
  <rect x="440" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="462" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">38</text>
  <rect x="488" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="510" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <rect x="536" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="558" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">32</text>
  <rect x="584" y="88" width="44" height="24" rx="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="606" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="462" y="128" text-anchor="middle" font-size="8" fill="#555">left=0</text>
  <text x="606" y="128" text-anchor="middle" font-size="8" fill="#555">right=3</text>
  <text x="660" y="105" font-size="9" fill="#888">each half already sorted</text>

  <!-- ===== ROW 2: mid passed in ===== -->
  <rect x="30" y="168" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="186" fill="#888">// mid passed in from merge_sort_recursive</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="181" x2="430" y2="181" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="430,177 438,181 430,185" fill="#bdc3c7"/>

  <!-- Data: halves colored, mid marked -->
  <rect x="440" y="168" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="462" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">38</text>
  <rect x="488" y="168" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="510" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <rect x="536" y="168" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="558" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">32</text>
  <rect x="584" y="168" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="606" y="185" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="462" y="206" text-anchor="middle" font-size="8" fill="#2980b9">left=0</text>
  <text x="510" y="218" text-anchor="middle" font-size="8" fill="#333" font-weight="bold">mid=1</text>
  <text x="606" y="206" text-anchor="middle" font-size="8" fill="#ca6f1e">right=3</text>
  <rect x="440" y="224" width="92" height="14" rx="2" fill="#d6eaf8"/>
  <text x="486" y="235" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="bold">left half [0..1]</text>
  <rect x="536" y="224" width="92" height="14" rx="2" fill="#fdebd0"/>
  <text x="582" y="235" text-anchor="middle" font-size="8" fill="#ca6f1e" font-weight="bold">right half [2..3]</text>

  <!-- ===== ROW 3: Copy left half ===== -->
  <rect x="30" y="256" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="274" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;int&gt; left_half(begin+left, begin+mid+1);</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="269" x2="438" y2="269" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,265 446,269 438,273" fill="#bdc3c7"/>

  <!-- Data: left_half = [38, 55] -->
  <text x="530" y="273" text-anchor="end" font-size="12" fill="#2980b9" font-weight="bold">left_half =</text>
  <rect x="536" y="256" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="558" y="273" text-anchor="middle" fill="white" font-size="11" font-weight="bold">38</text>
  <rect x="584" y="256" width="44" height="24" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="606" y="273" text-anchor="middle" fill="white" font-size="11" font-weight="bold">55</text>
  <text x="646" y="273" font-size="9" fill="#888">new vector, copy of [0..1]</text>

  <!-- ===== ROW 4: Copy right half ===== -->
  <rect x="30" y="322" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="340" fill="#9cdcfe">vector</tspan><tspan fill="#ddd">&lt;int&gt; right_half(begin+mid+1, begin+right+1);</tspan>
  </text>

  <!-- Connector line -->
  <line x1="380" y1="335" x2="438" y2="335" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,331 446,335 438,339" fill="#bdc3c7"/>

  <!-- Data: right_half = [32, 95] -->
  <text x="530" y="339" text-anchor="end" font-size="12" fill="#ca6f1e" font-weight="bold">right_half =</text>
  <rect x="536" y="322" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="558" y="339" text-anchor="middle" fill="white" font-size="11" font-weight="bold">32</text>
  <rect x="584" y="322" width="44" height="24" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="606" y="339" text-anchor="middle" fill="white" font-size="11" font-weight="bold">95</text>
  <text x="646" y="339" font-size="9" fill="#888">new vector, copy of [2..3]</text>

  <!-- ===== END STATE: Three vectors summary ===== -->
  <rect x="30" y="388" width="800" height="86" rx="8" fill="#f4f6f7" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="430" y="406" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">After Step 1: we now have 3 vectors</text>

  <!-- data[] -->
  <rect x="56" y="416" width="10" height="10" rx="2" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="426" fill="#333" font-weight="bold">data[]</tspan><tspan fill="#888">       [38, 55, 32, 95]  — the original array, Step 2 writes sorted results back here</tspan>
  </text>

  <!-- left_half -->
  <rect x="56" y="436" width="10" height="10" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="446" fill="#2980b9" font-weight="bold">left_half</tspan><tspan fill="#888">    [38, 55]  — read-only copy of data[0..1]</tspan>
  </text>

  <!-- right_half -->
  <rect x="56" y="456" width="10" height="10" rx="2" fill="#e67e22" stroke="#ca6f1e" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="11">
    <tspan x="72" y="466" fill="#ca6f1e" font-weight="bold">right_half</tspan><tspan fill="#888">   [32, 95]  — read-only copy of data[2..3]</tspan>
  </text>

  <!-- ===== CALLOUTS ===== -->
  <rect x="30" y="486" width="800" height="44" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="430" y="504" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980b9">This is the final merge — combining the two sorted halves into the fully sorted array.</text>
  <text x="430" y="520" text-anchor="middle" font-size="10" fill="#555">Each half was sorted by earlier recursive calls. Now merge() interleaves them in order.</text>
</svg>

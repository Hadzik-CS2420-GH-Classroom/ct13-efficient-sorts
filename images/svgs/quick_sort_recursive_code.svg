<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Sort badge -->
  <rect x="730" y="6" width="120" height="20" rx="10" fill="#8e44ad" opacity="0.85"/>
  <text x="790" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif">QUICK SORT</text>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">quick_sort_recursive(): The Recursion</text>
  <text x="430" y="48" text-anchor="middle" fill="#555" font-size="13">Partition around a pivot, then recurse on each side</text>

  <!-- ===== Parameter Key (map-legend style) ===== -->
  <rect x="130" y="62" width="10" height="10" rx="2" fill="#2980b9" stroke="#2471a3" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="144" y="72" fill="#2980b9" font-weight="bold">low</tspan><tspan fill="#888"> first index of subarray</tspan>
  </text>
  <rect x="380" y="62" width="10" height="10" rx="2" fill="#ca6f1e" stroke="#a04000" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="394" y="72" fill="#ca6f1e" font-weight="bold">high</tspan><tspan fill="#888"> last index of subarray</tspan>
  </text>
  <rect x="600" y="62" width="10" height="10" rx="2" fill="#27ae60" stroke="#219a52" stroke-width="1"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10">
    <tspan x="614" y="72" fill="#27ae60" font-weight="bold">pivot_idx</tspan><tspan fill="#888"> pivot's final position</tspan>
  </text>

  <!-- Column headers -->
  <text x="195" y="92" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="640" y="92" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="98" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="154" width="820" height="56" rx="0" fill="white"/>
  <rect x="20" y="210" width="820" height="56" rx="0" fill="#f9f9f9"/>
  <rect x="20" y="266" width="820" height="56" rx="0" fill="white"/>

  <!-- ===== ROW 1: Base case ===== -->
  <rect x="30" y="108" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="126" fill="#c586c0">if</tspan><tspan fill="#ddd"> (low &gt;= high) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="380" y1="121" x2="438" y2="121" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,117 446,121 438,125" fill="#bdc3c7"/>

  <text x="456" y="116" font-size="11" fill="#e74c3c" font-weight="bold">Base case: stop recursing.</text>
  <text x="456" y="132" font-size="11" fill="#555">0 or 1 elements in this range. Already sorted.</text>

  <!-- ===== ROW 2: Partition ===== -->
  <rect x="30" y="164" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="182" fill="#4ec9b0">int</tspan><tspan fill="#ddd"> pivot_idx = </tspan><tspan fill="#dcdcaa">partition</tspan><tspan fill="#ddd">(data, low, high);</tspan>
  </text>

  <line x1="380" y1="177" x2="438" y2="177" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,173 446,177 438,181" fill="#bdc3c7"/>

  <text x="456" y="172" font-size="11" fill="#27ae60" font-weight="bold">Partition: put one element in its final position.</text>
  <text x="456" y="188" font-size="11" fill="#555">Picks a pivot using <tspan font-weight="bold">median-of-three</tspan> (first, middle, last).</text>
  <text x="456" y="204" font-size="10" fill="#555">Rearranges so everything &#x2264; pivot is left, &gt; pivot is right. Returns pivot's final index.</text>

  <!-- ===== ROW 3: Recurse left ===== -->
  <rect x="30" y="220" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="238" fill="#dcdcaa">quick_sort_recursive</tspan><tspan fill="#ddd">(data, low, pivot_idx - 1);</tspan>
  </text>

  <line x1="380" y1="233" x2="438" y2="233" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,229 446,233 438,237" fill="#bdc3c7"/>

  <text x="456" y="228" font-size="11" fill="#2980b9" font-weight="bold">Sort everything left of the pivot.</text>
  <text x="456" y="244" font-size="11" fill="#555">The pivot is already in its final spot — skip it.</text>

  <!-- ===== ROW 4: Recurse right ===== -->
  <rect x="30" y="276" width="350" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="'Consolas', 'Courier New', monospace" font-size="10" fill="#ddd">
    <tspan x="40" y="294" fill="#dcdcaa">quick_sort_recursive</tspan><tspan fill="#ddd">(data, pivot_idx + 1, high);</tspan>
  </text>

  <line x1="380" y1="289" x2="438" y2="289" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="438,285 446,289 438,293" fill="#bdc3c7"/>

  <text x="456" y="284" font-size="11" fill="#ca6f1e" font-weight="bold">Sort everything right of the pivot.</text>
  <text x="456" y="300" font-size="11" fill="#555">Same process — partition, then recurse on each side.</text>

  <!-- Footer -->
  <rect x="30" y="326" width="800" height="44" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="430" y="344" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Key difference from merge sort: the work happens BEFORE the recursion (partition), not after (merge).</text>
  <text x="430" y="362" text-anchor="middle" fill="#555" font-size="11">Each partition places one element in its final position. Average: log n levels = O(n log n).</text>
</svg>
